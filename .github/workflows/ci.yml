name: CI

on:
  push:
    branches: ['*.x']
  pull_request:
  schedule:
    - cron: '0 0 1,16 * *'

jobs:
  symfony-version-tests:
    name: "Test: PHP ${{ matrix.php }}, Symfony ${{ matrix.symfony }}"

    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: [ 8.1, 8.2, 8.3, 8.4, 8.5 ]
        deps: [ highest ]
        symfony: [ 6.4.*, 7.2.*, 7.3.*, 8.0.* ]
        include:
          - php: 8.1
            deps: lowest
            symfony: '*'
        exclude:
          - php: 8.1
            symfony: 7.2.*
          - php: 8.1
            symfony: 7.3.*
          - php: 8.1
            symfony: 8.0.*
          - php: 8.2
            symfony: 8.0.*
          - php: 8.3
            symfony: 8.0.*
          # PHP 8.5: laminas-diagnostics 1.28+ conflicts with symfony/process < 7.4 (Symfony 6.4)
          - php: 8.5
            symfony: 6.4.*

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: flex

      - name: Install dependencies
        run: composer update --prefer-dist
        env:
          SYMFONY_REQUIRE: ${{ matrix.symfony }}

      - name: Run tests
        run: vendor/bin/phpunit

  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          coverage: xdebug

      - name: Install dependencies
        run: composer update --prefer-dist
        env:
          SYMFONY_REQUIRE: ${{ matrix.symfony }}

      - name: Run code coverage
        run: vendor/bin/phpunit --coverage-text

  composer-validate:
    name: Validate composer.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict --no-check-lock

  cs-check:
    name: PHP Coding Standards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.1
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-dist
        env:
          SYMFONY_REQUIRE: ${{ matrix.symfony }}

      - name: Check CS
        run: vendor/bin/php-cs-fixer fix --diff --dry-run --verbose
